<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Garden Task Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary-color: #4ade80;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --text-main: #102a43;
            --text-secondary: #627d98;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: var(--card-bg); width: 100%; max-width: 480px; padding: 30px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); position: relative; }

        /* Nút chọn ngày ở góc phải */
        .date-picker-wrapper { position: absolute; top: 30px; right: 30px; text-align: right; }
        #date-btn { background: #f0f4f8; border: none; padding: 8px 12px; border-radius: 10px; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        #date-btn:hover { background: #e2e8f0; color: var(--text-main); }
        #date-btn i { margin-right: 5px; }
        #task-date-input { display: none; } /* Ẩn input gốc */

        header h1 { color: var(--text-main); font-size: 1.8rem; margin-bottom: 5px; }
        #selected-date-display { font-size: 0.85rem; color: var(--primary-color); font-weight: 600; margin-bottom: 15px; display: block; }
        
        .progress-wrapper { margin: 15px 0 25px 0; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; }
        .progress-bar-bg { background: #e4e9f0; height: 6px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: var(--primary-color); height: 100%; width: 0%; transition: 0.5s ease; }

        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 14px 20px; border: 2px solid #edf2f7; border-radius: 15px; outline: none; transition: 0.3s; font-size: 1rem; }
        input[type="text"]:focus { border-color: var(--primary-color); }
        #add-btn { background: var(--primary-color); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; }

        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #f0f4f8; padding-bottom: 5px; }
        ul { list-style: none; margin-bottom: 25px; }

        li { background: #fff; padding: 12px 15px; border-radius: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 1px solid #f0f4f8; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .check-btn, .del-btn { padding: 8px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; }
        .check-btn { color: #cbd5e0; }
        .task-text { flex: 1; color: var(--text-main); font-weight: 500; font-size: 0.95rem; }

        #completed-list li { background: #fcfdfd; opacity: 0.7; }
        #completed-list .task-text { text-decoration: line-through; color: var(--text-secondary); }
        #completed-list .check-btn { color: var(--primary-color); }
        .del-btn { color: #ff8a8a; opacity: 0.4; }
        .del-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="date-picker-wrapper">
        <input type="date" id="task-date-input">
        <button id="date-btn"><i class="fas fa-calendar-alt"></i> Hôm khác</button>
    </div>

    <header>
        <h1>Meow Garden ✨</h1>
        <span id="selected-date-display">Ngày: Hôm nay</span>
        
        <div class="progress-wrapper">
            <div class="progress-info">
                <span>Tiến độ hoàn thành</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        </div>
    </header>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="Thêm việc mới...">
        <button id="add-btn"><i class="fas fa-plus"></i></button>
    </div>

    <div class="section-title">Đang thực hiện <span id="pending-count">0</span></div>
    <ul id="pending-list"></ul>

    <div class="section-title">Đã hoàn thành <span id="completed-count">0</span></div>
    <ul id="completed-list"></ul>
</div>

<script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const dateInput = document.getElementById('task-date-input');
    const dateDisplay = document.getElementById('selected-date-display');
    const pendingList = document.getElementById('pending-list');
    const completedList = document.getElementById('completed-list');

    // DÁN URL WEB APP CỦA BẠN VÀO ĐÂY
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPJS8d1WfIpUsYFkEFvv0BeBf5xpuV8rlt6MxfWBmIQIhreR91U5qcyZTNt8S1T77E/exec";

    let selectedDate = new Date().toISOString().split('T')[0];

    // 1. HÀM TẢI DỮ LIỆU TỪ SHEET VỀ APP
    async function loadTasksFromServer(date) {
        pendingList.innerHTML = "<li style='border:none; background:none; font-size:0.8rem;'>⌛ Đang tải dữ liệu từ Sheet...</li>";
        completedList.innerHTML = "";

        try {
            const response = await fetch(`${WEB_APP_URL}?date=${date}`);
            const data = await response.json();
            
            pendingList.innerHTML = ""; // Xóa dòng chữ "Đang tải"
            
            if (data.note) {
                // Tách các dòng trong ghi chú để tạo thành các việc cần làm
                const tasks = data.note.split('\n');
                tasks.forEach(taskText => {
                    if (taskText.trim()) {
                        // Hiển thị nội dung lên danh sách Đang thực hiện
                        pendingList.appendChild(createRow(taskText.trim(), false));
                    }
                });
            }
            updateStats();
        } catch (error) {
            pendingList.innerHTML = "<li style='border:none; color:red;'>Lỗi tải dữ liệu</li>";
        }
    }

    // 2. CẬP NHẬT KHI ĐỔI NGÀY
    dateInput.onchange = async (e) => {
        if (e.target.value) {
            selectedDate = e.target.value;
            const d = new Date(selectedDate);
            dateDisplay.innerText = `Ngày: ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
            
            // QUAN TRỌNG: Gọi hàm tải dữ liệu mới
            await loadTasksFromServer(selectedDate);
        }
    };

    // 3. HÀM GỬI DỮ LIỆU LÊN SHEET
    async function postTaskToSheet(taskText, taskDate) {
        const btnIcon = addBtn.querySelector('i');
        btnIcon.className = 'fas fa-spinner fa-spin'; 
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ date: taskDate, note: taskText })
            });
            // Tải lại dữ liệu sau khi lưu thành công để đồng bộ
            setTimeout(() => loadTasksFromServer(taskDate), 1000);
        } catch (error) {
            alert("Lỗi lưu dữ liệu!");
        } finally {
            btnIcon.className = 'fas fa-plus';
        }
    }

    async function addTask() {
        const val = input.value.trim();
        if (val) {
            input.value = "";
            await postTaskToSheet(val, selectedDate);
        }
    }

    function createRow(text, isDone) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="check-btn"><i class="fas ${isDone ? 'fa-check-circle' : 'fa-circle'}"></i></div>
            <span class="task-text">${text}</span>
            <div class="del-btn"><i class="fas fa-trash-alt"></i></div>
        `;
        // Logic Tick/Xóa giữ nguyên như cũ...
        li.querySelector('.check-btn').onclick = () => {
            if (!isDone) completedList.appendChild(createRow(text, true));
            else pendingList.appendChild(createRow(text, false));
            li.remove();
            updateStats();
        };
        li.querySelector('.del-btn').onclick = () => { li.remove(); updateStats(); };
        return li;
    }

    function updateStats() {
        const pCount = pendingList.querySelectorAll('li').length;
        const cCount = completedList.querySelectorAll('li').length;
        const total = pCount + cCount;
        document.getElementById('pending-count').innerText = pCount;
        document.getElementById('completed-count').innerText = cCount;
        const percent = total === 0 ? 0 : Math.round((cCount / total) * 100);
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = percent + "%";
    }

    addBtn.onclick = addTask;
    input.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };

    // TẢI DỮ LIỆU LẦN ĐẦU KHI MỞ APP
    window.onload = () => loadTasksFromServer(selectedDate);
</script>
</body>
</html>
