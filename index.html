<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee boy</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4ade80">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4ade80;
            --danger-color: #ff0000;
            --bg-color: #ffffff; /* Chuyển sang nền trắng thuần */
            --card-bg: #ffffff;
            --text-main: #102a43;
            --text-secondary: #627d98;
            --border-light: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        
        body { background: var(--bg-color); min-height: 100vh; display: flex; justify-content: center; padding: 0; }
        
        .container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 500px; 
            padding: 30px 20px; 
            position: relative;
        }
        
        .date-picker-wrapper { position: absolute; top: 30px; right: 20px; text-align: right; }
        
        #install-btn { 
            background: var(--primary-color); color: white; border: none; padding: 8px 12px; 
            border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; 
            margin-right: 5px; transition: 0.2s; animation: pulse 2s infinite; 
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        #date-btn { background: #f8fafc; border: 1px solid var(--border-light); padding: 8px 12px; border-radius: 10px; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        #task-date-input { position: absolute; opacity: 0; pointer-events: none; }
        
        header h1 { color: var(--text-main); font-size: 2rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        #selected-date-display { font-size: 0.9rem; color: var(--primary-color); font-weight: 600; margin-bottom: 30px; display: block; }
        
        /* Nhập liệu tối ưu cho di động */
        .input-group { display: flex; gap: 12px; margin-bottom: 35px; }
        input[type="text"] { 
            flex: 1; padding: 16px 20px; 
            border: 1.5px solid var(--border-light); 
            border-radius: 18px; outline: none; font-size: 1rem; 
            transition: 0.3s; background: #fafafa;
        }
        input[type="text"]:focus { border-color: var(--primary-color); background: #fff; }
        
        /* Nút + TO VÀ DỄ BẤM */
        #add-btn { 
            background: var(--primary-color); color: white; border: none; 
            width: 70px; border-radius: 18px; cursor: pointer; 
            font-size: 1.8rem; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center;
        }
        #add-btn:active { transform: scale(0.9); }
        
        .section-title { 
            font-size: 0.8rem; font-weight: 800; color: var(--text-secondary); 
            text-transform: uppercase; margin-bottom: 15px; 
            border-bottom: 1px solid var(--border-light); 
            padding-bottom: 8px; display: flex; justify-content: space-between; 
        }
        ul { list-style: none; margin-bottom: 30px; }
        
        li { 
            background: #fff; padding: 15px; border-radius: 16px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px; 
            border: 1.5px solid var(--border-light); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        li.fade-out { opacity: 0 !important; transform: scale(0.9) !important; }
        li.slide-out { opacity: 0 !important; transform: translateY(-15px) !important; }
        
        .check-btn { padding: 5px; cursor: pointer; font-size: 1.4rem; color: #e2e8f0; transition: 0.3s; }
        .task-text { flex: 1; color: var(--text-main); font-size: 1rem; font-weight: 500; }
        .del-btn { padding: 5px; cursor: pointer; font-size: 1.1rem; color: var(--danger-color); opacity: 0.4; }
        
        #completed-list li { border-color: transparent; background: #fdfdfd; }
        #completed-list .task-text { text-decoration: line-through; color: var(--text-secondary); opacity: 0.6; }
        #completed-list .check-btn { color: var(--primary-color); }
        
        .loading-text { text-align: center; color: var(--text-secondary); font-size: 0.9rem; padding: 20px; border: none !important; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="date-picker-wrapper">
        <button id="install-btn" style="display: none;"><i class="fas fa-download"></i> Tải App</button>
        <input type="date" id="task-date-input">
        <button id="date-btn"><i class="fas fa-calendar-alt"></i> Hôm khác</button>
    </div>
    <header>
        <h1>Bee boy 🐝</h1>
        <span id="selected-date-display">Ngày: --/--/----</span>
    </header>
<div class="input-group">
        <input type="text" id="task-input" placeholder="Việc cần làm?" 
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button id="add-btn"><i class="fas fa-plus"></i></button>
    </div>
    <div class="section-title">Việc cần làm <span id="pending-count">0</span></div>
    <ul id="pending-list"></ul>
    <div class="section-title">Đã hoàn thành <span id="completed-count">0</span></div>
    <ul id="completed-list"></ul>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }

    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'inline-block';
    });
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBtn.style.display = 'none';
            deferredPrompt = null;
        }
    });

    window.onload = function() {
        const input = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const dateInput = document.getElementById('task-date-input');
        const dateDisplay = document.getElementById('selected-date-display');
        const pendingList = document.getElementById('pending-list');
        const completedList = document.getElementById('completed-list');

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzqGBjKk9B2RyZb81ArMmEOiHqmqdfgvTXZmmwYgrM3-07siXXG2Rbrf5pN65Vzxz4G/exec";

        let selectedDate = new Date().toISOString().split('T')[0];

        function updateDateDisplay(dateStr) {
            const d = new Date(dateStr);
            dateDisplay.innerText = `Ngày: ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }
        updateDateDisplay(selectedDate);

        document.getElementById('date-btn').onclick = () => dateInput.showPicker ? dateInput.showPicker() : dateInput.click();
        
        dateInput.onchange = (e) => {
            if (e.target.value) {
                selectedDate = e.target.value;
                updateDateDisplay(selectedDate);
                loadTasksFromServer(selectedDate);
            }
        };

        async function postToServer(fullLineText, actionType) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ date: selectedDate, note: fullLineText, action: actionType })
                });
            } catch (error) { console.error("Error"); }
        }

async function loadTasksFromServer(date) {
    // 1. Lấy dữ liệu từ bộ nhớ đệm ra trước
    const cachedData = localStorage.getItem('bee_cache_' + date);
    if (cachedData) {
        renderTasks(cachedData); // Gọi hàm hiển thị dữ liệu (nên tách riêng hàm render)
    } else {
        pendingList.innerHTML = "<li class='loading-text'>Đang tải...</li>";
    }

    try {
        const response = await fetch(`${WEB_APP_URL}?date=${date}`);
        const data = await response.json();
        const serverNote = data.note || "";

        // 2. Chỉ vẽ lại giao diện nếu dữ liệu server khác với bản đệm
        if (serverNote !== cachedData) {
            localStorage.setItem('bee_cache_' + date, serverNote);
            renderTasks(serverNote);
        }
    } catch (error) {
        console.log("Đang ngoại tuyến, dùng dữ liệu đệm.");
    }
}

async function addTask() {
    const val = input.value.trim();
    if (!val) return;

    // 1. Cập nhật bản đệm cục bộ ngay lập tức
    const oldCache = localStorage.getItem('bee_cache_' + selectedDate) || "";
    const newCache = oldCache + (oldCache ? "\n" : "") + "- " + val;
    localStorage.setItem('bee_cache_' + selectedDate, newCache);
    
    // 2. Hiển thị ngay lên màn hình
    renderTasks(newCache);
    input.value = "";

    // 3. Gửi ngầm lên server
    postToServer(val, 'add');
}

        function createRow(fullLineText, isDone) {
            const cleanText = fullLineText.replace(/^-\s*(\d{2}:\d{2}:\s*)?/, "").replace(/\(hoàn thành\)$/, "").trim();
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="check-btn"><i class="${isDone ? 'fas fa-check-circle' : 'far fa-circle'}"></i></div>
                <span class="task-text">${cleanText}</span>
                <div class="del-btn"><i class="fas fa-trash-alt"></i></div>
            `;
            
            li.querySelector('.check-btn').onclick = () => {
                li.classList.add('fade-out'); 
                setTimeout(() => {
                    if (!isDone) {
                        isDone = true;
                        completedList.appendChild(li);
                        li.querySelector('.check-btn i').className = 'fas fa-check-circle';
                        postToServer(fullLineText, 'complete'); 
                    } else {
                        isDone = false;
                        pendingList.appendChild(li);
                        li.querySelector('.check-btn i').className = 'far fa-circle';
                        postToServer(fullLineText, 'uncomplete'); 
                    }
                    updateStats();
                    setTimeout(() => { li.classList.remove('fade-out'); }, 10);
                }, 300); 
            };

            li.querySelector('.del-btn').onclick = () => {
                li.classList.add('fade-out');
                setTimeout(() => {
                    li.remove();
                    updateStats();
                    postToServer(fullLineText, 'delete');
                }, 300);
            };
            return li;
        }

        function updateStats() {
            const pCount = Array.from(pendingList.children).filter(el => !el.classList.contains('loading-text')).length;
            document.getElementById('pending-count').innerText = pCount;
            document.getElementById('completed-count').innerText = completedList.children.length;
        }

        addBtn.onclick = addTask;
        input.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };
        loadTasksFromServer(selectedDate);
    };
</script>
</body>
</html>
