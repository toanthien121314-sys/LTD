<!DOCTYPE html>
<html>
<head>
    <title>Meow Garden Timeline</title>
    <meta charset="UTF-8">
    <style>
        /* CSS để tạo giao diện giống cái lịch trong ảnh của bạn */
        .calendar-container { font-family: Arial; display: flex; flex-wrap: wrap; gap: 20px; }
        .day-box { border: 1px solid #ccc; width: 40px; height: 40px; text-align: center; cursor: pointer; }
        .day-box.busy { background-color: #ff4d4d; color: white; } /* Màu đỏ cho ngày bận */
        .note-tooltip { display: none; position: absolute; background: #fff8dc; border: 1px solid orange; padding: 5px; }
    </style>
</head>
<body>
    <h1>Lịch Trình Meow Garden</h1>
    <div id="app" class="calendar-container">Đang tải dữ liệu từ Sheet...</div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxeel5crQikfdWcfbhnoJsgLCN0gZmBubmDoiBuTQTzBLvVog6YsM36i3Vnju8dK7dE/exec"; // Dán URL khi Deploy GAS vào đây

        // 1. CHIỀU ĐỌC: Lấy dữ liệu từ Sheet về hiển thị
        async function loadTimeline() {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            let html = "";
            data.months.forEach(month => {
                html += `<div><h3>${month.title}</h3><div style="display:grid; grid-template-columns: repeat(7, 1fr);">`;
                month.days.forEach(d => {
                    const isBusy = d.color === "#ff0000" ? "busy" : "";
                    html += `<div class="day-box ${isBusy}" onclick="openNote('${d.day}', '${d.note}')">${d.day}</div>`;
                });
                html += `</div></div>`;
            });
            document.getElementById("app").innerHTML = html;
        }

        // 2. CHIỀU GHI: Gửi dữ liệu từ App về Sheet
        function saveNote(date, noteText) {
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ date: date, note: noteText }),
            })
            .then(res => res.json())
            .then(result => alert("Đã lưu vào Sheet!"));
        }

        window.onload = loadTimeline;
    </script>
</body>
</html>
