<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công việc</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary-color: #4ade80;
            --danger-color: #ff4d4d; /* Màu đỏ thùng rác */
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --text-main: #102a43;
            --text-secondary: #627d98;
            --border-color: #f0f4f8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: var(--card-bg); width: 100%; max-width: 480px; padding: 30px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); position: relative; }
        
        /* Chọn ngày */
        .date-picker-wrapper { position: absolute; top: 30px; right: 30px; text-align: right; }
        #date-btn { background: #f0f4f8; border: none; padding: 8px 12px; border-radius: 10px; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        #task-date-input { position: absolute; opacity: 0; pointer-events: none; }
        
        /* Header */
        header h1 { color: var(--text-main); font-size: 1.8rem; margin-bottom: 5px; }
        #selected-date-display { font-size: 0.85rem; color: var(--primary-color); font-weight: 600; margin-bottom: 25px; display: block; }
        
        /* Nhập liệu */
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 14px 20px; border: 2px solid #edf2f7; border-radius: 15px; outline: none; font-size: 1rem; }
        #add-btn { background: var(--primary-color); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; }
        
        /* Tiêu đề mục */
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        ul { list-style: none; margin-bottom: 25px; min-height: 20px; }
        
        /* Dòng công việc */
        li { background: #fff; padding: 12px 15px; border-radius: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 1px solid var(--border-color); position: relative; }
        .check-btn { padding: 8px; cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; color: #cbd5e0; /* Chấm rỗng xám */ }
        .task-text { flex: 1; color: var(--text-main); font-size: 0.95rem; font-weight: 500; }
        
        /* Thùng rác đỏ đậm */
        .del-btn { padding: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; color: var(--danger-color); opacity: 0.8; }
        .del-btn:hover { opacity: 1; }
        
        /* Style Hoàn thành */
        #completed-list li { opacity: 0.6; background: #fcfdfd; }
        #completed-list .task-text { text-decoration: line-through; color: var(--text-secondary); }
        #completed-list .check-btn { color: var(--primary-color); } /* Xanh khi tick */
    </style>
</head>
<body>

<div class="container">
    <div class="date-picker-wrapper">
        <input type="date" id="task-date-input">
        <button id="date-btn"><i class="fas fa-calendar-alt"></i> Hôm khác</button>
    </div>
    <header>
        <h1>Meow Garden ✨</h1>
        <span id="selected-date-display">Ngày: --/--/----</span>
    </header>
    <div class="input-group">
        <input type="text" id="task-input" placeholder="Thêm việc mới...">
        <button id="add-btn"><i class="fas fa-plus"></i></button>
    </div>
    <div class="section-title">Đang thực hiện <span id="pending-count"></span></div>
    <ul id="pending-list"></ul>
    <div class="section-title">Đã hoàn thành <span id="completed-count"></span></div>
    <ul id="completed-list"></ul>
</div>

<script>
    window.onload = function() {
        const input = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const dateInput = document.getElementById('task-date-input');
        const dateDisplay = document.getElementById('selected-date-display');
        const pendingList = document.getElementById('pending-list');
        const completedList = document.getElementById('completed-list');
        const dateBtn = document.getElementById('date-btn');

        // *** DÁN URL WEB APP CỦA BẠN VÀO ĐÂY ***
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby09lrcqCxfYEmaXgDLbAwTk3UjYrR7YAgyJwo0hu4NECcNU3CmdRTIAuXe4JUzduQa/exec";

        let selectedDate = new Date().toISOString().split('T')[0];

        function updateDateDisplay(dateStr) {
            const d = new Date(dateStr);
            dateDisplay.innerText = `Ngày: ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }
        updateDateDisplay(selectedDate);

        dateBtn.onclick = () => dateInput.showPicker ? dateInput.showPicker() : dateInput.click();

        dateInput.onchange = (e) => {
            if (e.target.value) {
                selectedDate = e.target.value;
                updateDateDisplay(selectedDate);
                loadTasksFromServer(selectedDate);
            }
        };

        // HÀM GỬI YÊU CẦU (The Cầu nối) - Thêm tham số 'action'
        async function postToServer(fullLineText, actionType) {
            const btnIcon = addBtn.querySelector('i');
            btnIcon.className = 'fas fa-spinner fa-spin'; // Xoay báo đang xử lý
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ 
                        date: selectedDate, 
                        note: fullLineText, // Văn bản thô (có thể có gạch đầu dòng và giờ)
                        action: actionType  // 'add', 'delete', 'complete'
                    })
                });
                
                // Vì no-cors không đọc được JSON trả về, nên ta tải lại sau 1.5s để đồng bộ
                setTimeout(() => loadTasksFromServer(selectedDate), 1500);
            } catch (error) {
                alert("Lỗi kết nối Server");
                loadTasksFromServer(selectedDate); // Tải lại để reset trạng thái UI
            } finally {
                btnIcon.className = 'fas fa-plus';
            }
        }

        // TẢI VÀ PHÂN LOẠI DỮ LIỆU TỪ SHEET (Cập nhật quan trọng)
        async function loadTasksFromServer(date) {
            pendingList.innerHTML = "<li style='border:none;'>⌛ Đang tải...</li>";
            completedList.innerHTML = "";
            try {
                const response = await fetch(`${WEB_APP_URL}?date=${date}`);
                const data = await response.json();
                pendingList.innerHTML = "";
                
                if (data.note) {
                    const tasks = data.note.split('\n');
                    tasks.forEach(fullLine => {
                        if (fullLine.trim()) {
                            // Nhìn vào văn bản thô để phân loại
                            if (fullLine.includes("(hoàn thành)")) {
                                completedList.appendChild(createRow(fullLine.trim(), true));
                            } else {
                                pendingList.appendChild(createRow(fullLine.trim(), false));
                            }
                        }
                    });
                }
                updateStats();
            } catch (error) { pendingList.innerHTML = ""; }
        }

        async function addTask() {
            const val = input.value.trim();
            if (!val) return;
            // Gửi 'val' (nội dung mới) và action 'add'
            await postToServer(val, 'add');
            input.value = "";
        }

        // TẠO DÒNG CÔNG VIỆC (Cập nhật xử lý Tick và Xóa)
        function createRow(fullLineText, isDone) {
            // Hiển thị sạch trên App (Bỏ thời gian và gạch đầu dòng nếu có để dễ nhìn)
            // Chuẩn Note: "- HH:MM: [Nội dung] (hoàn thành)"
            const cleanText = fullLineText
                .replace(/^(\d{2}:\d{2}: )?- /, "") // Bỏ giờ và gạch
                .replace(" (hoàn thành)", "") // Bỏ chữ hoàn thành
                .trim();

            const li = document.createElement('li');
            li.innerHTML = `
                <div class="check-btn">
                    <i class="fas ${isDone ? 'fa-check-circle' : 'fa-circle'}"></i>
                </div>
                <span class="task-text">${cleanText}</span>
                <div class="del-btn" title="Xóa ghi chú này"><i class="fas fa-trash-alt"></i></div>
            `;
            
            // XỬ LÝ TICK ĐỂ HOÀN THÀNH
            li.querySelector('.check-btn').onclick = async () => {
                if (!isDone) {
                    // Chuyển UI tạm thời để nhanh
                    completedList.appendChild(li);
                    li.classList.add('completed-style'); // Cần thêm style CSS nếu muốn
                    updateStats();
                    // Gửi lệnh lên Sheet: Hoàn thành dòng thô này
                    await postToServer(fullLineText, 'complete');
                }
            };

            // XỬ LÝ XÓA DÒNG NÀY
            li.querySelector('.del-btn').onclick = async () => {
                // UI xóa tạm thời
                li.style.transform = "scale(0.8)";
                li.style.opacity = "0";
                setTimeout(() => { li.remove(); updateStats(); }, 200);
                
                // Gửi lệnh lên Sheet: Xóa chính xác dòng thô này
                await postToServer(fullLineText, 'delete');
            };
            
            return li;
        }

        function updateStats() {
            document.getElementById('pending-count').innerText = pendingList.children.length;
            document.getElementById('completed-count').innerText = completedList.children.length;
        }

        addBtn.onclick = addTask;
        input.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };

        // Tải dữ liệu ban đầu
        loadTasksFromServer(selectedDate);
    };
</script>
</body>
</html>
