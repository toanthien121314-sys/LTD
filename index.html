<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Garden Task Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary-color: #4ade80;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --text-main: #102a43;
            --text-secondary: #627d98;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }

        .container { background: var(--card-bg); width: 100%; max-width: 480px; padding: 30px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); height: fit-content; }

        header h1 { color: var(--text-main); font-size: 1.8rem; margin-bottom: 5px; }
        
        .progress-wrapper { margin: 20px 0; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .progress-bar-bg { background: #e4e9f0; height: 8px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: var(--primary-color); height: 100%; width: 0%; transition: 0.5s ease; }

        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 14px 20px; border: 2px solid #edf2f7; border-radius: 15px; outline: none; transition: 0.3s; font-size: 1rem; }
        input:focus { border-color: var(--primary-color); }
        #add-btn { background: var(--primary-color); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; }

        .section-title { font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #f0f4f8; padding-bottom: 5px; }
        ul { list-style: none; margin-bottom: 25px; min-height: 20px; }

        li {
            background: #fff;
            padding: 12px 15px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            border: 1px solid #f0f4f8;
            transition: 0.2s;
        }

        /* Tăng diện tích nhấn cho icon */
        .check-btn, .del-btn { 
            padding: 8px; 
            cursor: pointer; 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-btn { color: #cbd5e0; }
        .task-text { flex: 1; color: var(--text-main); font-weight: 500; font-size: 1rem; pointer-events: none; }

        /* Style cho việc đã xong */
        #completed-list li { background: #fcfdfd; opacity: 0.7; }
        #completed-list .task-text { text-decoration: line-through; color: var(--text-secondary); }
        #completed-list .check-btn { color: var(--primary-color); }

        .del-btn { color: #ff8a8a; opacity: 0.5; }
        .del-btn:hover { opacity: 1; color: #ff4d4d; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Meow Garden ✨</h1>
        <div class="progress-wrapper">
            <div class="progress-info">
                <span>Tiến độ hoàn thành</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        </div>
    </header>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="Thêm việc mới...">
        <button id="add-btn"><i class="fas fa-plus"></i></button>
    </div>

    <div class="section-title">Đang thực hiện <span id="pending-count">0</span></div>
    <ul id="pending-list"></ul>

    <div class="section-title">Đã hoàn thành <span id="completed-count">0</span></div>
    <ul id="completed-list"></ul>
</div>

<script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const pendingList = document.getElementById('pending-list');
    const completedList = document.getElementById('completed-list');

    // Hàm cập nhật tiến độ
    function updateStats() {
        const pCount = pendingList.querySelectorAll('li').length;
        const cCount = completedList.querySelectorAll('li').length;
        const total = pCount + cCount;
        
        document.getElementById('pending-count').innerText = pCount;
        document.getElementById('completed-count').innerText = cCount;
        
        const percent = total === 0 ? 0 : Math.round((cCount / total) * 100);
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = percent + "%";
    }

    // Hàm tạo phần tử task
    function createRow(text, isDone) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="check-btn"><i class="fas ${isDone ? 'fa-check-circle' : 'fa-circle'}"></i></div>
            <span class="task-text">${text}</span>
            <div class="del-btn"><i class="fas fa-trash-alt"></i></div>
        `;

        // Sự kiện Tick (hoàn thành)
        li.querySelector('.check-btn').onclick = () => {
            if (!isDone) {
                completedList.appendChild(createRow(text, true));
            } else {
                pendingList.appendChild(createRow(text, false));
            }
            li.remove();
            updateStats();
        };

        // Sự kiện Xóa
        li.querySelector('.del-btn').onclick = () => {
            li.style.transform = "scale(0.9)";
            li.style.opacity = "0";
            setTimeout(() => { li.remove(); updateStats(); }, 200);
        };

        return li;
    }

    function addTask() {
        const val = input.value.trim();
        if (val) {
            pendingList.appendChild(createRow(val, false));
            input.value = "";
            updateStats();
        }
    }

    addBtn.onclick = addTask;
    input.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };

    // Khởi tạo ban đầu
    updateStats();
</script>

</body>
</html>
