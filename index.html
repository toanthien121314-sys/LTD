<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Garden To-do</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h2 class="text-xl font-bold mb-4 text-green-700">Meow Garden To-do</h2>
        
        <input type="hidden" id="taskId">
        <input type="date" id="taskDate" class="w-full border p-2 mb-2 rounded">
        <textarea id="taskContent" placeholder="Việc cần làm..." class="w-full border p-2 mb-2 rounded"></textarea>
        <button onclick="saveTask()" id="btnSave" class="w-full bg-green-600 text-white p-2 rounded font-bold">LƯU CÔNG VIỆC</button>
        
        <hr class="my-4">
        <div id="listTasks" class="space-y-2"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwh3AgfRvpl9mYZ1RbneeMxU3Aahh7OPPRIYZHyRKe_JLfZRrvGLUZbyA-4eNOkMhPu6w/exec";

        async function loadTasks() {
            const res = await fetch(API_URL + "?action=getTasks");
            const tasks = await res.json();
            const container = document.getElementById('listTasks');
            container.innerHTML = tasks.map(t => `
                <div class="p-3 bg-gray-50 rounded border flex justify-between items-center">
                    <div>
                        <div class="text-xs text-gray-500">${t.date}</div>
                        <div class="font-medium">${t.content}</div>
                    </div>
                    <button onclick="editTask('${t.id}', '${t.date}', '${t.content}')" class="text-blue-600">Sửa</button>
                </div>
            `).join('');
        }

async function saveTask() {
    const content = document.getElementById('taskContent').value;
    const date = document.getElementById('taskDate').value;
    const id = document.getElementById('taskId').value;

    if (!content || !date) return alert("Nhập đủ ngày và nội dung đã Thiện ơi!");

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerHTML = "ĐANG LƯU...";

    const data = { action: "addOrUpdate", id, date, content };

    // Dùng kỹ thuật gửi dữ liệu kiểu cũ (navigator.sendBeacon hoặc bỏ await) 
    // để tránh bị treo do Google Script Redirect
    fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', // Ép kiểu để bypass CORS
        body: JSON.stringify(data)
    }).then(() => {
        // Vì no-cors không đọc được kết quả, ta giả định là thành công sau khi gửi
        alert("Đã gửi yêu cầu! Đợi vài giây rồi tải lại trang nhé.");
        location.reload(); 
    }).catch(err => {
        alert("Lỗi kết nối: " + err);
        btn.disabled = false;
        btn.innerHTML = "LƯU CÔNG VIỆC";
    });
}

        function editTask(id, date, content) {
            document.getElementById('taskId').value = id;
            document.getElementById('taskDate').value = date;
            document.getElementById('taskContent').value = content;
            window.scrollTo(0,0);
        }

        loadTasks();
    </script>
</body>
</html>
