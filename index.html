<!DOCTYPE html>
<html>
<head>
    <title>Meow Garden Timeline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .error-msg { color: red; border: 1px solid red; padding: 10px; display: none; }
        .loading { color: #666; }
        /* Style cho các ô ngày giống trong Sheet của bạn */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 400px; }
        .day { border: 1px solid #ddd; padding: 10px; text-align: center; background: #f9f9f9; cursor: pointer; }
        .day.busy { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <h2>Lịch Trình Meow Garden</h2>
    <div id="status" class="loading">Đang kết nối với Google Sheets...</div>
    <div id="error" class="error-msg"></div>
    <div id="app"></div>

    <script>
        // THAY URL NÀY BẰNG URL WEB APP MỚI NHẤT CỦA BẠN
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxeel5crQikfdWcfbhnoJsgLCN0gZmBubmDoiBuTQTzBLvVog6YsM36i3Vnju8dK7dE/exec"; 

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error("Không thể kết nối với Web App GAS.");
                
                const data = await response.json();
                renderCalendar(data);
                document.getElementById('status').style.display = 'none';
            } catch (err) {
                document.getElementById('status').style.display = 'none';
                const errDiv = document.getElementById('error');
                errDiv.style.display = 'block';
                errDiv.innerText = "Lỗi: " + err.message + ". Hãy kiểm tra xem bạn đã Deploy GAS ở chế độ 'Anyone' chưa?";
                console.error(err);
            }
        }

        function renderCalendar(data) {
            let html = "";
            data.months.forEach(m => {
                html += `<h3>${m.title}</h3><div class="calendar-grid">`;
                m.days.forEach(d => {
                    const style = d.color === "#ff0000" || d.color === "red" ? "busy" : "";
                    html += `<div class="day ${style}" title="${d.note || ''}">${d.day}</div>`;
                });
                html += `</div>`;
            });
            document.getElementById('app').innerHTML = html;
        }

        window.onload = fetchData;
    </script>
</body>
</html>
