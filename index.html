<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Garden Task Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary-color: #4ade80;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #102a43;
            --text-secondary: #627d98;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            height: fit-content;
        }

        header h1 { color: var(--text-main); font-size: 1.8rem; margin-bottom: 5px; }
        
        /* Progress Section */
        .progress-wrapper { margin: 20px 0; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .progress-bar-bg { background: #e4e9f0; height: 8px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: var(--primary-color); height: 100%; width: 0%; transition: 0.5s ease; }

        /* Input Group */
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 14px 20px; border: 2px solid #edf2f7; border-radius: 15px; outline: none; transition: 0.3s; font-size: 1rem; }
        input:focus { border-color: var(--primary-color); background: #fff; }
        #add-btn { background: var(--primary-color); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        #add-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(74, 222, 128, 0.3); }

        /* Sections */
        .section-title { font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        ul { list-style: none; margin-bottom: 25px; }

        /* Task Item */
        li {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .check-icon { color: #cbd5e0; cursor: pointer; font-size: 1.3rem; transition: 0.3s; }
        .task-text { flex: 1; color: var(--text-main); font-weight: 500; font-size: 1rem; }

        /* Completed Styles */
        #completed-list li { opacity: 0.6; background: #f8fafc; }
        #completed-list .task-text { text-decoration: line-through; color: var(--text-secondary); }
        #completed-list .check-icon { color: var(--primary-color); }

        .del-btn { color: #ff8a8a; cursor: pointer; padding: 5px; opacity: 0.3; transition: 0.3s; }
        li:hover .del-btn { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Meow Garden ✨</h1>
        <div class="progress-wrapper">
            <div class="progress-info">
                <span>Tiến độ công việc</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>
    </header>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="Thêm việc mới cho vườn...">
        <button id="add-btn"><i class="fas fa-plus"></i></button>
    </div>

    <div class="section-title">Đang thực hiện <span id="pending-count">0</span></div>
    <ul id="pending-list"></ul>

    <div class="section-title">Đã hoàn thành <span id="completed-count">0</span></div>
    <ul id="completed-list"></ul>
</div>

<script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const pendingList = document.getElementById('pending-list');
    const completedList = document.getElementById('completed-list');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');

    function updateStats() {
        const pCount = pendingList.children.length;
        const cCount = completedList.children.length;
        const total = pCount + cCount;
        
        document.getElementById('pending-count').innerText = pCount;
        document.getElementById('completed-count').innerText = cCount;
        
        const percent = total === 0 ? 0 : Math.round((cCount / total) * 100);
        progressFill.style.width = percent + "%";
        progressText.innerText = percent + "%";
    }

    function createLeaf(text, isCompleted = false) {
        const li = document.createElement('li');
        li.innerHTML = `
            <i class="fas ${isCompleted ? 'fa-check-circle' : 'fa-circle'} check-icon"></i>
            <span class="task-text">${text}</span>
            <i class="fas fa-trash-alt del-btn"></i>
        `;

        // Click vào nút tick
        li.querySelector('.check-icon').onclick = () => {
            if (!isCompleted) {
                completedList.appendChild(createLeaf(text, true));
                li.remove();
            } else {
                pendingList.appendChild(createLeaf(text, false));
                li.remove();
            }
            updateStats();
        };

        // Click xóa
        li.querySelector('.del-btn').onclick = () => {
            li.style.opacity = "0";
            li.style.transform = "scale(0.8)";
            setTimeout(() => { li.remove(); updateStats(); }, 300);
        };

        return li;
    }

    function handleAddTask() {
        const val = input.value.trim();
        if (val) {
            pendingList.appendChild(createLeaf(val));
            input.value = "";
            updateStats();
        }
    }

    addBtn.onclick = handleAddTask;
    input.onkeypress = (e) => { if (e.key === 'Enter') handleAddTask(); };
</script>

</body>
</html>
