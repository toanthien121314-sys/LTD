<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Garden Task</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4ade80;
            --danger-color: #ff0000;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --text-main: #102a43;
            --text-secondary: #627d98;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: var(--card-bg); width: 100%; max-width: 480px; padding: 30px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); position: relative; }
        
        .date-picker-wrapper { position: absolute; top: 30px; right: 30px; text-align: right; }
        
        /* NÚT TẢI APP */
        #install-btn { 
            background: var(--primary-color); color: white; border: none; padding: 8px 12px; 
            border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; 
            margin-right: 5px; transition: 0.2s; animation: pulse 2s infinite; 
        }
        #install-btn:hover { background: #38c172; transform: scale(0.95); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        #date-btn { background: #f0f4f8; border: none; padding: 8px 12px; border-radius: 10px; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        #date-btn:hover { background: #e2e8f0; }
        #task-date-input { position: absolute; opacity: 0; pointer-events: none; }
        
        header h1 { color: var(--text-main); font-size: 1.8rem; margin-bottom: 5px; }
        #selected-date-display { font-size: 0.85rem; color: var(--primary-color); font-weight: 600; margin-bottom: 25px; display: block; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 14px 20px; border: 2px solid #edf2f7; border-radius: 15px; outline: none; font-size: 1rem; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary-color); }
        #add-btn { background: var(--primary-color); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        #add-btn:active { transform: scale(0.9); }
        
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid #f0f4f8; padding-bottom: 5px; display: flex; justify-content: space-between; }
        ul { list-style: none; margin-bottom: 25px; min-height: 10px; }
        
        li { background: #fff; padding: 12px 15px; border-radius: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 1px solid #f0f4f8; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; transform: translateY(0) scale(1); }
        li.fade-out { opacity: 0 !important; transform: scale(0.9) !important; pointer-events: none; }
        li.slide-out { opacity: 0 !important; transform: translateY(-10px) !important; pointer-events: none; }
        
        .check-btn { padding: 8px; cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; color: #cbd5e0; transition: 0.3s; }
        .check-btn:hover { transform: scale(1.1); }
        .task-text { flex: 1; color: var(--text-main); font-size: 0.95rem; font-weight: 500; transition: 0.3s; }
        .del-btn { padding: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; color: var(--danger-color); opacity: 0.5; transition: 0.3s; }
        .del-btn:hover { opacity: 1; transform: scale(1.1); }
        
        #completed-list li { background: #fcfdfd; }
        #completed-list .task-text { text-decoration: line-through; color: var(--text-secondary); opacity: 0.7; }
        #completed-list .check-btn { color: var(--primary-color); }
        
        .loading-text { text-align: center; color: var(--text-secondary); font-size: 0.85rem; padding: 10px; border: none !important; background: transparent !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="date-picker-wrapper">
        <button id="install-btn" style="display: none;"><i class="fas fa-download"></i> Tải App</button>
        <input type="date" id="task-date-input">
        <button id="date-btn"><i class="fas fa-calendar-alt"></i> Hôm khác</button>
    </div>
    <header>
        <h1>Meow Garden ✨</h1>
        <span id="selected-date-display">Ngày: --/--/----</span>
    </header>
    <div class="input-group">
        <input type="text" id="task-input" placeholder="Thêm việc mới...">
        <button id="add-btn"><i class="fas fa-plus"></i></button>
    </div>
    <div class="section-title">Đang thực hiện <span id="pending-count">0</span></div>
    <ul id="pending-list"></ul>
    <div class="section-title">Đã hoàn thành <span id="completed-count">0</span></div>
    <ul id="completed-list"></ul>
</div>

<script>
    // --- ĐĂNG KÝ SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Đã đăng ký Service Worker'))
                .catch(err => console.log('Lỗi đăng ký SW: ', err));
        });
    }
    // --- LOGIC CÀI ĐẶT APP (PWA) ---
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'inline-block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });

    // --- LOGIC GIAO DIỆN CHÍNH ---
    window.onload = function() {
        const input = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const dateInput = document.getElementById('task-date-input');
        const dateDisplay = document.getElementById('selected-date-display');
        const pendingList = document.getElementById('pending-list');
        const completedList = document.getElementById('completed-list');

        // *** BẠN NHỚ DÁN URL WEB APP VÀO ĐÂY NHÉ ***
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzqGBjKk9B2RyZb81ArMmEOiHqmqdfgvTXZmmwYgrM3-07siXXG2Rbrf5pN65Vzxz4G/exec";

        let selectedDate = new Date().toISOString().split('T')[0];

        function updateDateDisplay(dateStr) {
            const d = new Date(dateStr);
            dateDisplay.innerText = `Ngày: ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }
        updateDateDisplay(selectedDate);

        document.getElementById('date-btn').onclick = () => dateInput.showPicker ? dateInput.showPicker() : dateInput.click();
        
        dateInput.onchange = (e) => {
            if (e.target.value) {
                selectedDate = e.target.value;
                updateDateDisplay(selectedDate);
                loadTasksFromServer(selectedDate);
            }
        };

        async function postToServer(fullLineText, actionType) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ date: selectedDate, note: fullLineText, action: actionType })
                });
            } catch (error) {
                console.error("Lỗi đồng bộ ngầm");
            }
        }

        async function loadTasksFromServer(date) {
            const loadingHTML = "<li class='loading-text'><i class='fas fa-spinner fa-spin'></i> Đang tải dữ liệu...</li>";
            pendingList.innerHTML = loadingHTML;
            completedList.innerHTML = loadingHTML;
            try {
                const response = await fetch(`${WEB_APP_URL}?date=${date}`);
                const data = await response.json();
                
                pendingList.innerHTML = "";
                completedList.innerHTML = "";
                
                if (data.note) {
                    data.note.split('\n').forEach(fullLine => {
                        if (fullLine.trim()) {
                            if (fullLine.includes("(hoàn thành)")) {
                                completedList.appendChild(createRow(fullLine.trim(), true));
                            } else {
                                pendingList.appendChild(createRow(fullLine.trim(), false));
                            }
                        }
                    });
                }
                updateStats();
            } catch (error) { 
                pendingList.innerHTML = "<li class='loading-text'>Không thể tải dữ liệu</li>"; 
                completedList.innerHTML = "";
            }
        }

        async function addTask() {
            const val = input.value.trim();
            if (!val) return;
            
            const newRow = createRow(val, false);
            newRow.classList.add('slide-out'); 
            pendingList.appendChild(newRow); 
            
            input.value = "";
            updateStats();

            setTimeout(() => { newRow.classList.remove('slide-out'); }, 10);
            postToServer(val, 'add');
        }

        function createRow(fullLineText, isDone) {
            const cleanText = fullLineText.replace(/^-\s*(\d{2}:\d{2}:\s*)?/, "").replace(/\(hoàn thành\)$/, "").trim();
            const li = document.createElement('li');
            
            li.innerHTML = `
                <div class="check-btn"><i class="${isDone ? 'fas fa-check-circle' : 'far fa-circle'}"></i></div>
                <span class="task-text">${cleanText}</span>
                <div class="del-btn"><i class="fas fa-trash-alt"></i></div>
            `;
            
            li.querySelector('.check-btn').onclick = () => {
                li.classList.add('fade-out'); 
                
                setTimeout(() => {
                    if (!isDone) {
                        isDone = true;
                        completedList.appendChild(li);
                        li.querySelector('.check-btn i').className = 'fas fa-check-circle';
                        postToServer(fullLineText, 'complete'); 
                    } else {
                        isDone = false;
                        pendingList.appendChild(li);
                        li.querySelector('.check-btn i').className = 'far fa-circle';
                        postToServer(fullLineText, 'uncomplete'); 
                    }
                    updateStats();
                    setTimeout(() => { li.classList.remove('fade-out'); }, 10);
                }, 300); 
            };

            li.querySelector('.del-btn').onclick = () => {
                li.classList.add('fade-out');
                setTimeout(() => {
                    li.remove();
                    updateStats();
                    postToServer(fullLineText, 'delete');
                }, 300);
            };
            
            return li;
        }

        function updateStats() {
            const pCount = Array.from(pendingList.children).filter(el => !el.classList.contains('loading-text')).length;
            document.getElementById('pending-count').innerText = pCount;
            document.getElementById('completed-count').innerText = completedList.children.length;
        }

        addBtn.onclick = addTask;
        input.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };

        loadTasksFromServer(selectedDate);
    };
</script>
</body>
</html>
